<svg width="100%" viewBox="0 0 680 520" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Products service in a microservices event-driven architecture</title>
  <desc>Diagram showing an API Gateway receiving client requests and routing to three microservices: Products, Orders, and Payments. Each service communicates via a central Message Broker (event bus). Each service has its own database.</desc>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      text { font-family: Arial, sans-serif; }
      .th  { font-size: 14px; font-weight: 500; fill: #1a1a1a; }
      .ts  { font-size: 12px; font-weight: 400; fill: #555; }
      .thi { font-size: 14px; font-weight: 500; fill: #0C447C; }
      .tsi { font-size: 12px; font-weight: 400; fill: #185FA5; }
      .thg { font-size: 14px; font-weight: 500; fill: #27500A; }
      .tsg { font-size: 12px; font-weight: 400; fill: #3B6D11; }
      .tha { font-size: 14px; font-weight: 500; fill: #633806; }
      .tsa { font-size: 12px; font-weight: 400; fill: #854F0B; }
      .thn { font-size: 14px; font-weight: 500; fill: #444441; }
      .tsn { font-size: 12px; font-weight: 400; fill: #5F5E5A; }

      @media (prefers-color-scheme: dark) {
        .th  { fill: #e8e6e0; }
        .ts  { fill: #a8a69f; }
        .thi { fill: #B5D4F4; }
        .tsi { fill: #85B7EB; }
        .thg { fill: #C0DD97; }
        .tsg { fill: #97C459; }
        .tha { fill: #FAC775; }
        .tsa { fill: #EF9F27; }
        .thn { fill: #D3D1C7; }
        .tsn { fill: #B4B2A9; }

        .box-gray   { fill: #2C2C2A; stroke: #5F5E5A; }
        .box-blue   { fill: #042C53; stroke: #185FA5; }
        .box-green  { fill: #173404; stroke: #3B6D11; }
        .box-amber  { fill: #412402; stroke: #854F0B; }
        .box-db     { fill: #1e1e1c; stroke: #444441; }
        .broker-bg  { fill: #1a1610; stroke: #854F0B; }
      }

      .box-gray   { fill: #F1EFE8; stroke: #888780; }
      .box-blue   { fill: #E6F1FB; stroke: #378ADD; }
      .box-green  { fill: #EAF3DE; stroke: #639922; }
      .box-amber  { fill: #FAEEDA; stroke: #BA7517; }
      .box-db     { fill: #F7F6F2; stroke: #B4B2A9; }
      .broker-bg  { fill: #FAEEDA; stroke: #BA7517; }

      .arr-line   { stroke: #888780; stroke-width: 1; fill: none; stroke-linejoin: round; marker-end: url(#arrow); }
      .arr-event  { stroke: #BA7517; stroke-width: 1; stroke-dasharray: 5 4; fill: none; stroke-linejoin: round; marker-end: url(#arrow); }
    </style>
  </defs>

  <g transform="translate(40, 220)">
    <rect width="90" height="44" rx="8" stroke-width="0.5" class="box-gray"/>
    <text class="thn" x="45" y="18" text-anchor="middle" dominant-baseline="central">Client</text>
    <text class="tsn" x="45" y="34" text-anchor="middle" dominant-baseline="central">Web / Mobile</text>
  </g>

  <line x1="130" y1="242" x2="168" y2="242" class="arr-line"/>

  <g transform="translate(170, 210)">
    <rect width="110" height="64" rx="8" stroke-width="0.5" class="box-gray"/>
    <text class="thn" x="55" y="20" text-anchor="middle" dominant-baseline="central">API Gateway</text>
    <text class="tsn" x="55" y="38" text-anchor="middle" dominant-baseline="central">Auth / routing</text>
    <text class="tsn" x="55" y="53" text-anchor="middle" dominant-baseline="central">Rate limiting</text>
  </g>

  <path d="M280 232 L300 232 L300 108 L368 108" class="arr-line"/>
  <line x1="280" y1="242" x2="368" y2="242" class="arr-line"/>
  <path d="M280 252 L300 252 L300 376 L368 376" class="arr-line"/>

  <g transform="translate(370, 80)">
    <rect width="130" height="56" rx="8" stroke-width="0.5" class="box-blue"/>
    <text class="thi" x="65" y="20" text-anchor="middle" dominant-baseline="central">Products API</text>
    <text class="tsi" x="65" y="38" text-anchor="middle" dominant-baseline="central">POST / GET /api/products</text>
  </g>
  <g transform="translate(540, 83)">
    <rect width="100" height="50" rx="6" stroke-width="0.5" class="box-db"/>
    <text class="thn" x="50" y="20" text-anchor="middle" dominant-baseline="central">SQL Server</text>
    <text class="tsn" x="50" y="36" text-anchor="middle" dominant-baseline="central">Products DB</text>
  </g>
  <line x1="500" y1="108" x2="538" y2="108" class="arr-line"/>

  <g transform="translate(370, 214)">
    <rect width="130" height="56" rx="8" stroke-width="0.5" class="box-green"/>
    <text class="thg" x="65" y="20" text-anchor="middle" dominant-baseline="central">Orders API</text>
    <text class="tsg" x="65" y="38" text-anchor="middle" dominant-baseline="central">Create / track orders</text>
  </g>
  <g transform="translate(540, 217)">
    <rect width="100" height="50" rx="6" stroke-width="0.5" class="box-db"/>
    <text class="thn" x="50" y="20" text-anchor="middle" dominant-baseline="central">SQL Server</text>
    <text class="tsn" x="50" y="36" text-anchor="middle" dominant-baseline="central">Orders DB</text>
  </g>
  <line x1="500" y1="242" x2="538" y2="242" class="arr-line"/>

  <g transform="translate(370, 348)">
    <rect width="130" height="56" rx="8" stroke-width="0.5" class="box-amber"/>
    <text class="tha" x="65" y="20" text-anchor="middle" dominant-baseline="central">Payments API</text>
    <text class="tsa" x="65" y="38" text-anchor="middle" dominant-baseline="central">Process transactions</text>
  </g>
  <g transform="translate(540, 351)">
    <rect width="100" height="50" rx="6" stroke-width="0.5" class="box-db"/>
    <text class="thn" x="50" y="20" text-anchor="middle" dominant-baseline="central">SQL Server</text>
    <text class="tsn" x="50" y="36" text-anchor="middle" dominant-baseline="central">Payments DB</text>
  </g>
  <line x1="500" y1="376" x2="538" y2="376" class="arr-line"/>

  <g transform="translate(170, 445)">
    <rect width="470" height="50" rx="10" stroke-width="0.5" class="broker-bg"/>
    <text class="tha" x="235" y="20" text-anchor="middle" dominant-baseline="central">Message Broker — Event Bus</text>
    <text class="tsa" x="235" y="37" text-anchor="middle" dominant-baseline="central">product.created · order.placed · payment.completed</text>
  </g>

  <path d="M435 136 L435 156 L520 156 L520 443" class="arr-event"/>
  <path d="M435 270 L435 290 L520 290 L520 443" class="arr-event"/>
  <path d="M435 404 L435 424 L520 424 L520 443" class="arr-event"/>

  <path d="M330 445 L330 124 L368 124" class="arr-event"/>
  <path d="M330 445 L330 258 L368 258" class="arr-event"/>
  <path d="M330 445 L330 392 L368 392" class="arr-event"/>

  <g transform="translate(40, 460)">
    <line x1="0" y1="0" x2="28" y2="0" class="arr-line"/>
    <text class="tsn" x="36" y="2" dominant-baseline="central">Sync HTTP call</text>
    
    <line x1="0" y1="18" x2="28" y2="18" class="arr-event"/>
    <text class="tsn" x="36" y="20" dominant-baseline="central">Async event (publish / consume)</text>
  </g>
</svg>
